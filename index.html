<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>潮州會館中學獎學金簽收平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        canvas { touch-action: none; }
        
        /* 列印樣式設定 */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* 模式 1：單張收據列印 (預設) */
            body:not(.print-table-mode) * { visibility: hidden; }
            body:not(.print-table-mode) #step-3, body:not(.print-table-mode) #step-3 * { visibility: visible; }
            body:not(.print-table-mode) #step-3 { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; padding: 0; }
            
            /* 模式 2：表格批量列印 */
            body.print-table-mode * { visibility: hidden; }
            body.print-table-mode #print-area, body.print-table-mode #print-area * { visibility: visible; }
            body.print-table-mode #print-area { position: absolute; left: 0; top: 0; width: 100%; display: block !important; padding: 20px; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="no-print bg-blue-600 text-white p-3 md:p-4 shadow-md flex justify-between items-center z-10 sticky top-0">
        <div class="flex items-center gap-3 text-lg md:text-xl font-bold">
            <img src="./logo.png" alt="校徽" class="h-10 w-10 object-contain bg-white rounded-full p-0.5 shadow-sm">
            潮州會館中學獎學金簽收平台
        </div>
        <div id="connection-status" class="flex items-center gap-2 text-xs md:text-sm bg-blue-700 px-3 py-1.5 rounded-full whitespace-nowrap">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-400 animate-pulse"></div>
            <span id="status-text" class="hidden md:inline">連線中...</span>
        </div>
    </header>

    <main class="flex-1 flex justify-center items-start pt-4 md:pt-8 px-4 pb-12 w-full">
        
        <div id="step-1" class="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-6 flex flex-col gap-4">
            <div class="flex w-full bg-gray-100 p-1.5 rounded-xl no-print">
                <button id="tab-pending" onclick="switchTab('pending')" class="flex-1 py-2.5 text-center rounded-lg bg-white shadow font-bold text-blue-600 transition-all">待簽收名單</button>
                <button id="tab-signed" onclick="switchTab('signed')" class="flex-1 py-2.5 text-center rounded-lg text-gray-500 font-bold hover:text-blue-600 transition-all">已簽收紀錄</button>
            </div>

            <div id="batch-print-controls" class="hidden gap-2 w-full no-print">
                <button onclick="printByClass()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg shadow transition-colors flex justify-center items-center gap-2 text-sm">
                    <i class="ph ph-printer text-lg"></i> 列印本班紀錄
                </button>
                <button onclick="showPrintAwardModal()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded-lg shadow transition-colors flex justify-center items-center gap-2 text-sm">
                    <i class="ph ph-printer text-lg"></i> 依獎項列印
                </button>
            </div>

            <div class="relative no-print">
                <i class="ph ph-users absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl"></i>
                <select id="class-select" class="w-full pl-12 pr-10 py-3 text-lg border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 appearance-none bg-white cursor-pointer">
                    <option value="">請選擇班級...</option>
                </select>
                <i class="ph ph-caret-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl pointer-events-none"></i>
            </div>

            <div id="student-list" class="flex flex-col gap-3">
                <div class="text-center text-gray-500 py-8 text-lg">讀取資料中...</div>
            </div>
        </div>

        <div id="step-2" class="hidden w-full max-w-2xl bg-white rounded-2xl shadow-lg p-6 flex flex-col gap-6">
            <button onclick="goBack()" class="self-start flex items-center gap-2 text-blue-600 font-semibold text-lg hover:bg-blue-50 px-4 py-2 rounded-lg transition-colors no-print">
                <i class="ph ph-arrow-left text-xl"></i> 返回列表
            </button>

            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 shrink-0">
                <h3 class="text-sm font-semibold text-blue-800 uppercase tracking-wider mb-3">受獎人與獎項資訊</h3>
                <div class="flex flex-col md:flex-row md:justify-between items-start gap-4">
                    <div>
                        <p class="text-gray-500 text-sm mb-1 font-bold">班級：<span id="detail-class-info"></span></p>
                        <p id="detail-name" class="text-4xl font-bold text-gray-900 mb-2"></p>
                        <p id="detail-award" class="text-xl text-gray-700 font-medium flex items-center gap-2"></p>
                    </div>
                    <div id="detail-prizes" class="flex flex-col gap-3 w-full md:w-auto border-t md:border-t-0 md:border-l border-blue-200 pt-4 md:pt-0 md:pl-6"></div>
                </div>
            </div>

            <div class="flex flex-col gap-3 flex-1 min-h-[350px] md:min-h-[450px]">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-pen-nib"></i> 請在下方空白處簽名</h3>
                    <button onclick="clearSignature()" class="text-gray-500 hover:text-red-500 text-sm flex items-center gap-1">
                        <i class="ph ph-eraser text-lg"></i> 重新簽名
                    </button>
                </div>
                <div class="flex-1 border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 relative overflow-hidden">
                    <canvas id="signature-canvas" class="absolute inset-0 w-full h-full cursor-crosshair"></canvas>
                </div>
            </div>

            <button id="submit-btn" onclick="submitSignature()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2 shrink-0">
                <i class="ph ph-check-circle text-2xl"></i> 確認簽收
            </button>
        </div>

        <div id="step-3" class="hidden w-full max-w-2xl bg-white md:rounded-2xl md:shadow-lg p-6 flex flex-col gap-6">
            <button onclick="goBack()" class="no-print self-start flex items-center gap-2 text-blue-600 font-semibold text-lg hover:bg-blue-50 px-4 py-2 rounded-lg transition-colors">
                <i class="ph ph-arrow-left text-xl"></i> 返回列表
            </button>

            <div class="text-center pb-4 border-b-2 border-dashed border-gray-200">
                <h2 class="text-3xl font-bold text-gray-800">獎學金簽收證明</h2>
                <p id="record-time" class="text-gray-500 mt-2 flex justify-center items-center gap-2"></p>
            </div>

            <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                <div class="flex flex-col md:flex-row md:justify-between items-start gap-4">
                    <div>
                        <p class="text-gray-500 text-sm mb-1 font-bold">班級：<span id="record-class-info"></span></p>
                        <p id="record-name" class="text-4xl font-bold text-gray-900 mb-2"></p>
                        <p id="record-award" class="text-xl text-gray-700 font-medium flex items-center gap-2"></p>
                    </div>
                    <div id="record-prizes" class="flex flex-col gap-3 w-full md:w-auto border-t md:border-t-0 md:border-l border-gray-300 pt-4 md:pt-0 md:pl-6"></div>
                </div>
            </div>

            <div class="flex flex-col gap-3 items-center mt-2">
                <h3 class="text-lg font-bold text-gray-800 w-full text-left">受獎人簽名：</h3>
                <img id="record-signature-img" src="" alt="讀取簽名中..." class="border border-gray-200 rounded-xl w-full h-auto max-h-[350px] object-contain bg-white p-2 shadow-sm">
            </div>

            <button onclick="window.print()" class="no-print w-full mt-4 bg-gray-600 hover:bg-gray-700 text-white font-bold text-lg py-3 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2">
                <i class="ph ph-printer text-xl"></i> 列印單張收據
            </button>
        </div>

        <div id="print-area" class="hidden"></div>
    </main>

    <script>
        // ==========================================
        // 替換成你的 Google Apps Script Web App URL
        // ==========================================
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxn9g9ioXDzgtlAFq7Tq-6lZsJ-Nawn2tORai5Zzap5t3gws722pmvxx35LcP22LlUZ/exec"; 

        let studentsData = { pending: [], signed: [] };
        let currentTab = 'pending';
        let selectedStudent = null;
        let signaturePad;

        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const step3 = document.getElementById('step-3');
        const studentListContainer = document.getElementById('student-list');
        const classSelect = document.getElementById('class-select');
        const canvas = document.getElementById('signature-canvas');

        window.onload = async () => {
            initSignaturePad();
            window.addEventListener('resize', resizeCanvas);
            classSelect.addEventListener('change', (e) => renderStudentList(e.target.value));
            await fetchStudentData();
        };

        function initSignaturePad() {
            signaturePad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 0)", minWidth: 2, maxWidth: 4 });
        }

        function resizeCanvas() {
            if (step2.classList.contains('hidden')) return;
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }

        function formatCurrency(amount) { return "$" + amount.toLocaleString(); }

        function getValidImageUrl(url) {
            if (!url) return '';
            const match = url.match(/id=([a-zA-Z0-9_-]+)/);
            if (match) {
                return `https://lh3.googleusercontent.com/d/$${match[1]}`;
            }
            return url;
        }

        async function fetchStudentData() {
            if (!GOOGLE_APP_SCRIPT_URL || GOOGLE_APP_SCRIPT_URL === "在此輸入你的網址") {
                updateStatus("請填入 URL", "bg-gray-400");
                return;
            }
            try {
                const response = await fetch(GOOGLE_APP_SCRIPT_URL);
                const data = await response.json();
                if(data.error) throw new Error(data.error);
                
                studentsData = data;
                updateStatus("已連線", "bg-green-400");
                populateClassSelect();
                renderStudentList(classSelect.value);
            } catch (error) {
                updateStatus("連線失敗", "bg-red-500");
            }
        }

        function updateStatus(text, dotClass) {
            document.getElementById('status-text').innerText = text;
            document.getElementById('status-dot').className = `w-2.5 h-2.5 rounded-full ${dotClass}`;
        }

        function switchTab(tab) {
            currentTab = tab;
            const pendingBtn = document.getElementById('tab-pending');
            const signedBtn = document.getElementById('tab-signed');
            
            if(tab === 'pending') {
                pendingBtn.className = "flex-1 py-2.5 text-center rounded-lg bg-white shadow font-bold text-blue-600 transition-all";
                signedBtn.className = "flex-1 py-2.5 text-center rounded-lg text-gray-500 font-bold hover:text-blue-600 transition-all";
                document.getElementById('batch-print-controls').style.display = 'none';
            } else {
                signedBtn.className = "flex-1 py-2.5 text-center rounded-lg bg-white shadow font-bold text-blue-600 transition-all";
                pendingBtn.className = "flex-1 py-2.5 text-center rounded-lg text-gray-500 font-bold hover:text-blue-600 transition-all";
                document.getElementById('batch-print-controls').style.display = 'flex';
            }
            
            populateClassSelect();
            renderStudentList(classSelect.value);
        }

        function populateClassSelect() {
            const list = currentTab === 'pending' ? studentsData.pending : studentsData.signed;
            const classes = [...new Set(list.map(s => s.class))].filter(Boolean).sort();
            
            const currentSelection = classSelect.value;
            classSelect.innerHTML = '<option value="">請選擇班級...</option>';
            
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls;
                option.innerText = cls;
                classSelect.appendChild(option);
            });
            
            if(classes.includes(currentSelection)) classSelect.value = currentSelection;
        }

        function renderStudentList(selectedClass = '') {
            studentListContainer.innerHTML = '';
            
            if (!selectedClass) {
                studentListContainer.innerHTML = '<div class="text-center text-gray-500 py-8 text-lg">請從上方選單選擇班級</div>';
                return;
            }

            const list = currentTab === 'pending' ? studentsData.pending : studentsData.signed;
            const filtered = list.filter(s => s.class === selectedClass);

            if (filtered.length === 0) {
                studentListContainer.innerHTML = `<div class="text-center text-gray-500 py-8">該班級目前沒有${currentTab === 'pending' ? '待簽收' : '已簽收'}的學生</div>`;
                return;
            }

            filtered.forEach(student => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-gray-50 hover:bg-blue-50 border border-gray-200 p-4 rounded-xl flex justify-between items-center transition-colors active:bg-blue-100";
                btn.onclick = () => currentTab === 'pending' ? selectStudent(student) : viewRecord(student);
                
                let prizeTags = '';
                if (student.bookCoupons > 0) prizeTags += `<span class="inline-block bg-orange-100 text-orange-800 text-xs font-semibold px-2 py-1 rounded border border-orange-200">書券</span> `;
                if (student.supermarketCoupons > 0) prizeTags += `<span class="inline-block bg-green-100 text-green-800 text-xs font-semibold px-2 py-1 rounded border border-green-200">超市禮券</span> `;
                if (student.cheque > 0) prizeTags += `<span class="inline-block bg-purple-100 text-purple-800 text-xs font-semibold px-2 py-1 rounded border border-purple-200">支票</span> `;

                const timeInfo = currentTab === 'signed' ? `<div class="text-xs text-gray-500 mt-2"><i class="ph ph-clock"></i> ${student.timestamp}</div>` : '';
                
                // 加入空格的姓名顯示與合併後的獎項文字
                const nameDisplay = student.classNumber ? `${student.name} (${student.classNumber})` : student.name;
                const awardDisplay = student.category ? `${student.award} (${student.category})` : student.award;

                btn.innerHTML = `
                    <div class="flex-1">
                        <div class="text-xl font-bold text-gray-800 flex items-center">${nameDisplay}</div>
                        <div class="text-gray-600 font-medium mt-1 mb-2">${awardDisplay}</div>
                        <div class="flex flex-wrap gap-1">${prizeTags}</div>
                        ${timeInfo}
                    </div>
                    <div class="text-right pl-4">
                        <i class="${currentTab === 'pending' ? 'ph ph-pen-nib text-blue-500' : 'ph ph-receipt text-green-500'} text-2xl"></i>
                    </div>
                `;
                studentListContainer.appendChild(btn);
            });
        }

        function generatePrizesHTML(student) {
            let html = '';
            if (student.bookCoupons > 0) {
                html += `<div class="flex justify-between items-center gap-6"><span class="text-gray-600 font-semibold flex items-center gap-2"><i class="ph ph-book-open text-orange-500 text-xl"></i> 書券</span><span class="text-2xl font-bold text-orange-600">${formatCurrency(student.bookCoupons)}</span></div>`;
            }
            if (student.supermarketCoupons > 0) {
                html += `<div class="flex justify-between items-center gap-6 mt-2"><span class="text-gray-600 font-semibold flex items-center gap-2"><i class="ph ph-shopping-cart text-green-500 text-xl"></i> 超市禮券</span><span class="text-2xl font-bold text-green-600">${formatCurrency(student.supermarketCoupons)}</span></div>`;
            }
            if (student.cheque > 0) {
                html += `<div class="flex justify-between items-center gap-6 mt-2"><span class="text-gray-600 font-semibold flex items-center gap-2"><i class="ph ph-money text-purple-500 text-xl"></i> 支票</span><span class="text-2xl font-bold text-purple-600">${formatCurrency(student.cheque)}</span></div>`;
            }
            return html || '<div class="text-gray-400">無發放金額</div>';
        }

        function selectStudent(student) {
            selectedStudent = student;
            
            // 加入空格的姓名顯示與合併後的獎項文字
            const nameDisplay = student.classNumber ? `${student.name} (${student.classNumber})` : student.name;
            const awardDisplay = student.category ? `${student.award} (${student.category})` : student.award;
            
            document.getElementById('detail-class-info').innerText = student.class;
            document.getElementById('detail-name').innerText = nameDisplay;
            document.getElementById('detail-award').innerHTML = `<i class="ph ph-medal text-blue-5
